<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ HUB | Start</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Orbitron:wght@700&family=Caveat:wght@500&display=swap');
        
        body { 
            margin: 0; padding: 0; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #0f0c29; color: white; font-family: 'Segoe UI', sans-serif;
            background-image: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px; border-radius: 30px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 400px; width: 90%;
        }

        h1 { font-family: 'Montserrat'; font-size: 1.5rem; margin-bottom: 20px; letter-spacing: 2px; }

        input {
            width: 80%; padding: 15px; border-radius: 15px; border: 2px solid #6c5ce7;
            background: #000; color: #fff; font-size: 1.2rem; text-align: center;
            margin-bottom: 20px; font-family: 'Montserrat';
        }

        .container { 
            display: none; gap: 20px; flex-wrap: wrap; 
            justify-content: center; padding: 20px; animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { 
            width: 260px; height: 320px; border-radius: 25px; 
            text-decoration: none; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 0.3s; 
            border: 4px solid rgba(255,255,255,0.1); text-align: center; 
        }

        /* Space-Modus */
        .space { background: #030305; border-color: #ff0055; }
        .space:hover { transform: translateY(-10px); box-shadow: 0 0 30px #ff0055; }
        .space h2 { font-family: 'Orbitron'; color: #ff0055; }

        /* Comic-Modus */
        .comic { background: white; border-color: #2d3436; }
        .comic:hover { transform: translateY(-10px); box-shadow: 0 0 30px #6c5ce7; }
        .comic h2 { font-family: 'Montserrat'; color: #6c5ce7; }

        /* Keller-Modus (Stift & Papier) */
        .paper { background: #f4e4c1; border-color: #8b5a2b; }
        .paper:hover { transform: translateY(-10px); box-shadow: 0 0 30px #d4a373; }
        .paper h2 { font-family: 'Caveat', cursive; color: #5c3a21; font-size: 1.8rem; }

        .btn-primary {
            background: #6c5ce7; color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            cursor: pointer; font-family: 'Montserrat'; width: 100%;
        }

        .change-name {
            margin-top: 30px; background: none; border: none; 
            color: rgba(255,255,255,0.4); cursor: pointer; text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="login-area" class="login-box">
        <h1>SPIELERREGISTRIERUNG</h1>
        <input type="text" id="player-name" placeholder="DEIN NAME..." maxlength="15">
        <button class="btn-primary" onclick="saveName()">WEITER ZUM DESIGN</button>
    </div>

    <div id="selection-area" class="container">
        <h1 style="width:100%; text-align:center;">WÄHLE DEIN DESIGN</h1>
        
        <a href="space.html" class="card space">
            <span style="font-size: 4rem;">🚀</span>
            <h2>SPACE MODUS</h2>
        </a>

        <a href="comic.html" class="card comic">
            <span style="font-size: 4rem;">⚡</span>
            <h2>COMIC MODUS</h2>
        </a>

        <a href="paper.html" class="card paper">
            <span style="font-size: 4rem;">📜✏️</span>
            <h2>KELLER: STIFT & PAPIER</h2>
            <p style="font-size:0.7rem; margin-top:10px;">Analog – mit Moderator</p>
        </a>

        <button class="change-name" onclick="clearName()">Name ändern</button>
    </div>

    <script>
        function saveName() {
            const name = document.getElementById('player-name').value.trim();
            if(name.length > 1) {
                localStorage.setItem('quiz_username', name);
                showSelection();
            } else {
                alert("Bitte gib einen Namen ein (mindestens 2 Zeichen)!");
            }
        }

        function showSelection() {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('selection-area').style.display = 'flex';
        }

        function clearName() {
            localStorage.removeItem('quiz_username');
            location.reload();
        }

        window.onload = () => {
            if(localStorage.getItem('quiz_username')) {
                showSelection();
            }
        }
    </script>
</body>
</html>
