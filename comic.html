<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMIC BATTLE 2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Montserrat:wght@900&display=swap');
        
        :root { --bg: #fdfdfd; --primary: #6c5ce7; --accent: #fdcb6e; --success: #00b894; --danger: #ff4757; }

        body { 
            font-family: 'Fredoka', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center;
            background-image: radial-gradient(#ddd 1px, transparent 1px); background-size: 20px 20px; min-height: 100vh;
        }

        header { width: 100%; max-width: 600px; padding: 15px; position: sticky; top: 0; z-index: 100; box-sizing: border-box; }
        .status-panel { background: white; border: 4px solid #000; border-radius: 20px; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 8px 8px 0px #000; }
        .file-info { font-size: 0.6rem; color: var(--primary); font-weight: 900; margin-top: 4px; text-transform: uppercase; }

        .joker-row { display: flex; gap: 12px; margin: 20px 0; }
        .joker-btn {
            background: white; border: 3px solid #000; border-radius: 12px; width: 55px; height: 55px; font-size: 1.5rem;
            cursor: pointer; transition: 0.2s; box-shadow: 4px 4px 0px #000; display: flex; align-items: center; justify-content: center;
        }
        .joker-btn.active { background: var(--accent); transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        .joker-btn.used { opacity: 0.2; pointer-events: none; filter: grayscale(1); }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 90%; max-width: 800px; padding-bottom: 120px; }
        .card { background: white; border: 4px solid #000; border-radius: 15px; padding: 20px 5px; text-align: center; cursor: pointer; box-shadow: 6px 6px 0px #000; transition: 0.2s; }
        .card:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px #000; }
        .card.boss { background: var(--accent); grid-column: 1 / -1; border-style: dashed; }
        .card.disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(108, 92, 231, 0.4); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal { background: white; width: 85%; max-width: 380px; padding: 25px; border-radius: 30px; border: 5px solid #000; text-align: center; box-shadow: 12px 12px 0px #000; }

        .btn-main { background: var(--primary); color: white; border: 3px solid #000; padding: 15px; border-radius: 15px; font-weight: 900; cursor: pointer; width: 100%; box-shadow: 4px 4px 0px #000; margin-top: 10px; }
        .btn-main:active { transform: translate(2px, 2px); box-shadow: none; }
        .btn-sub { background: none; border: none; color: #666; cursor: pointer; text-decoration: underline; margin-top: 15px; font-weight: 700; font-size: 0.8rem; }

        input { border: 3px solid #000; padding: 15px; border-radius: 12px; width: 80%; text-align: center; font-family: 'Montserrat'; font-size: 1.5rem; margin: 15px 0; outline: none; }

        nav.bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 4px solid #000; display: flex; justify-content: space-around; padding: 12px; box-sizing: border-box; }
        .nav-btn { background: none; border: none; font-weight: 900; cursor: pointer; font-size: 0.7rem; font-family: 'Montserrat'; }
    </style>
</head>
<body>

    <header>
        <div class="status-panel">
            <div>
                <div style="font-weight:900; font-size:0.9rem" id="p-name">HERO</div>
                <div id="file-name" class="file-info">MISSION: KEINE DATEI</div>
            </div>
            <div style="font-family:'Montserrat'; font-size:1.8rem">❤️<span id="hp-val">100</span></div>
        </div>
    </header>

    <div class="joker-row">
        <div class="joker-btn" id="j-Schild" onclick="toggleJoker('Schild')">🛡️</div>
        <div class="joker-btn" id="j-Schwert" onclick="toggleJoker('Schwert')">⚔️</div>
        <div class="joker-btn" id="j-Trank" onclick="toggleJoker('Trank')">🧪</div>
    </div>

    <div class="grid" id="game-grid"></div>

    <div id="modal-upload" class="overlay"><div class="modal">
        <h2 style="font-family:'Montserrat'">MISSION LOAD</h2>
        <input type="file" id="excel-input" accept=".xlsx, .xls" style="font-size:0.8rem; border:none">
        <button class="btn-main" onclick="loadExcel()">DATEN SYNC</button>
        <button class="btn-sub" onclick="closeM('modal-upload')">ABBRECHEN</button>
    </div></div>

    <div id="modal-quiz" class="overlay"><div class="modal">
        <div id="boss-tag" style="color:var(--danger); font-weight:900; display:none; margin-bottom:10px">💥 BOSS-RUNDE 💥</div>
        <div id="q-cat" style="font-weight:900; color:var(--primary); text-transform:uppercase; font-size:0.7rem">Kategorie</div>
        <div id="q-text" style="font-size:1.2rem; margin:15px 0; font-weight:700">Frage...</div>
        <input type="number" id="ans-input" inputmode="numeric">
        <button class="btn-main" id="btn-check" onclick="checkAns()">ANTWORTEN!</button>
        <div id="feedback" style="margin-top:15px; font-weight:900"></div>
        <button class="btn-main" id="btn-next" style="display:none; background:var(--success)" onclick="next()">NÄCHSTE RUNDE</button>
    </div></div>

    <nav class="bottom-nav">
        <button class="nav-btn" onclick="location.href='index.html'">🏠 MENÜ</button>
        <button class="nav-btn" onclick="openM('modal-upload')">📁 DATEI</button>
        <button class="nav-btn" onclick="location.reload()">🔄 RESET</button>
    </nav>

    <script>
        const sb = supabase.createClient('https://eaxuqsiwrfqshqkwtnlz.supabase.co', 'sb_publishable_PViFkgap3gvsxBgG2NSAjA_Oc0eASzI');
        let questions = JSON.parse(localStorage.getItem('comic_v2')) || [];
        let hp = 100, score = 0, qDone = 0, activeJoker = null, curIdx = null;
        let usedJokers = { Schild: false, Schwert: false, Trank: false }, catUsage = {};

        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        function toggleJoker(type) {
            if(usedJokers[type]) return;
            const btn = document.getElementById('j-'+type);
            if(activeJoker === type) { activeJoker = null; btn.classList.remove('active'); }
            else { activeJoker = type; document.querySelectorAll('.joker-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        }

        function loadExcel() {
            const file = document.getElementById('excel-input').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                questions = data.map(r => ({
                    c: r.Kategorie || "Allgemein", q: r.Frage || r.q,
                    a: parseFloat(String(r.Antwort || r.a).replace(/[^0-9.-]/g, '')),
                    b: String(r.Boss || "").toLowerCase().includes('ja'), u: false
                })).filter(x => x.q && !isNaN(x.a));
                localStorage.setItem('comic_v2', JSON.stringify(questions));
                localStorage.setItem('comic_filename', file.name);
                location.reload();
            };
            reader.readAsArrayBuffer(file);
        }

        function render() {
            const grid = document.getElementById('game-grid'); grid.innerHTML = "";
            const isBoss = ((qDone + 1) % 4 === 0);
            if(isBoss) {
                const card = document.createElement('div'); card.className = "card boss";
                card.innerHTML = `<div style="font-size:1.3rem">💥 BOSS FIGHT 💥</div>`;
                card.onclick = () => { const bQ = questions.find(q => q.b && !q.u) || questions.find(q => !q.u); start(questions.indexOf(bQ), true); };
                grid.appendChild(card);
            } else {
                [...new Set(questions.map(q => q.c))].forEach(cat => {
                    const u = catUsage[cat] || 0; const card = document.createElement('div');
                    card.className = "card" + (u >= 2 ? " disabled" : "");
                    card.innerHTML = `<strong>${cat}</strong><br><small>${u}/2</small>`;
                    if(u < 2) card.onclick = () => { start(questions.findIndex(q => q.c === cat && !q.u)); catUsage[cat] = u + 1; };
                    grid.appendChild(card);
                });
            }
        }

        function start(idx, boss = false) {
            curIdx = idx; document.getElementById('boss-tag').style.display = boss ? 'block' : 'none';
            document.getElementById('q-cat').innerText = questions[idx].c;
            document.getElementById('q-text').innerText = questions[idx].q;
            document.getElementById('feedback').innerText = ""; document.getElementById('ans-input').value = "";
            document.getElementById('btn-next').style.display = 'none'; document.getElementById('btn-check').style.display = 'block';
            openM('modal-quiz');
        }

        function checkAns() {
            const q = questions[curIdx]; const guess = parseFloat(document.getElementById('ans-input').value);
            if(isNaN(guess)) return;
            let diff = Math.abs(guess - q.a);
            if(activeJoker === 'Schild' && diff > 10) diff = 10;
            if(activeJoker === 'Trank') diff = Math.floor(diff/2);
            if(diff === 0) { let h = (activeJoker==='Schwert')?15:5; hp=Math.min(100, hp+h); score+=500; document.getElementById('feedback').innerHTML=`<span style="color:var(--success)">VOLTREFFER! +${h} ❤️</span>`; }
            else { hp-=diff; score+=Math.max(0, 100-diff); document.getElementById('feedback').innerHTML=`<span style="color:var(--danger)">BOOM! -${diff} ❤️ | LÖSUNG: ${q.a}</span>`; }
            if(activeJoker) { usedJokers[activeJoker]=true; document.getElementById('j-'+activeJoker).classList.add('used'); activeJoker=null; }
            q.u = true; qDone++; document.getElementById('hp-val').innerText = hp;
            document.getElementById('btn-check').style.display='none'; document.getElementById('btn-next').style.display='block';
            if(hp <= 0 || qDone >= 20) end();
        }

        function next() { closeM('modal-quiz'); render(); }
        async function end() { const n = localStorage.getItem('quiz_username') || 'Held'; await sb.from('highscores').insert([{ name:n, score }]); alert("SCORE: "+score); location.reload(); }

        window.onload = () => {
            document.getElementById('p-name').innerText = localStorage.getItem('quiz_username') || "HERO";
            const f = localStorage.getItem('comic_filename'); if(f) document.getElementById('file-name').innerText = "MISSION: " + f;
            if(questions.length > 0) render(); else openM('modal-upload');
        };
    </script>
</body>
</html>
