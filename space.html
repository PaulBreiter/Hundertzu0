<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MISSION 2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { --bg: #030308; --accent: #ff0055; --blue: #00d4ff; --gold: #ffcc00; --text: #e0e0e5; }

        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        header { width: 100%; max-width: 600px; padding: 15px; position: sticky; top: 0; z-index: 100; }
        .ui-panel { background: rgba(15, 17, 26, 0.9); border: 2px solid var(--blue); border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); backdrop-filter: blur(10px); }
        .file-tag { font-size: 0.6rem; color: var(--gold); margin-top: 4px; letter-spacing: 1px; }

        .joker-row { display: flex; gap: 15px; margin: 20px 0; }
        .j-box { background: rgba(0,0,0,0.6); border: 2px solid var(--blue); border-radius: 10px; width: 55px; height: 55px; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .j-box.active { background: var(--blue); box-shadow: 0 0 20px var(--blue); transform: scale(1.1); }
        .j-box.used { opacity: 0.2; pointer-events: none; border-color: #444; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 800px; padding-bottom: 120px; }
        .card { background: rgba(20, 25, 40, 0.8); border: 1px solid var(--blue); border-radius: 12px; padding: 25px 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { background: var(--blue); color: #000; box-shadow: 0 0 20px var(--blue); }
        .card.boss { border-color: var(--accent); color: var(--accent); grid-column: 1/-1; font-family: 'Orbitron'; }
        .card.disabled { opacity: 0.2; cursor: not-allowed; border-color: #333; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal { background: #0a0a0f; width: 85%; max-width: 380px; padding: 30px; border-radius: 20px; border: 2px solid var(--blue); text-align: center; }

        .btn-neon { background: none; border: 2px solid var(--blue); color: var(--blue); padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; font-family: 'Orbitron'; font-size: 0.8rem; }
        .btn-neon:hover { background: var(--blue); color: #000; box-shadow: 0 0 20px var(--blue); }

        input { background: none; border: 1px solid var(--blue); color: #fff; padding: 15px; border-radius: 10px; width: 80%; text-align: center; font-size: 1.5rem; margin: 15px 0; outline: none; font-family: 'Orbitron'; }

        nav.bottom-nav { position: fixed; bottom: 0; width: 100%; background: #05050a; border-top: 1px solid var(--blue); display: flex; justify-content: space-around; padding: 15px; }
        .nav-link { color: var(--blue); background: none; border: none; font-family: 'Orbitron'; font-size: 0.65rem; cursor: pointer; opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <div class="ui-panel">
            <div>
                <div style="font-family:'Orbitron'; font-size:0.8rem" id="p-name">PILOT</div>
                <div id="file-name" class="file-tag">OS: KEINE DATEI</div>
            </div>
            <div style="font-family:'Orbitron'; font-size:1.5rem; color:var(--accent)">HP <span id="hp-val">100</span></div>
        </div>
    </header>

    <div class="joker-row">
        <div class="j-box" id="j-Schild" onclick="toggleJoker('Schild')">🛡️</div>
        <div class="j-box" id="j-Schwert" onclick="toggleJoker('Schwert')">⚔️</div>
        <div class="j-box" id="j-Trank" onclick="toggleJoker('Trank')">🧪</div>
    </div>

    <div class="grid" id="main-grid"></div>

    <div id="modal-upload" class="overlay"><div class="modal">
        <h2 style="font-family:'Orbitron'; color:var(--blue)">UPLOAD DATA</h2>
        <input type="file" id="excel-input" accept=".xlsx, .xls" style="font-size:0.7rem; border:none">
        <button class="btn-neon" onclick="load()">INITIALIZE</button>
        <button class="nav-link" style="margin-top:15px" onclick="closeM('modal-upload')">ABBRECHEN</button>
    </div></div>

    <div id="modal-quiz" class="overlay"><div class="modal">
        <div id="boss-tag" style="color:var(--accent); font-family:'Orbitron'; margin-bottom:15px; display:none">>>> BOSS ENCOUNTER <<<</div>
        <div id="q-cat" style="color:var(--gold); font-size:0.7rem; letter-spacing:2px">SEKTOR</div>
        <div id="q-text" style="font-size:1.3rem; margin:20px 0">Scanning...</div>
        <input type="number" id="ans-input" inputmode="numeric">
        <button class="btn-neon" id="btn-check" onclick="check()">SEND SIGNAL</button>
        <div id="feedback" style="margin-top:20px; font-weight:700"></div>
        <button class="btn-neon" id="btn-next" style="display:none; border-color:var(--gold); color:var(--gold)" onclick="next()">NEXT SECTOR</button>
    </div></div>

    <nav class="bottom-nav">
        <button class="nav-link" onclick="location.href='index.html'">BASE</button>
        <button class="nav-link" onclick="openM('modal-upload')">FILES</button>
        <button class="nav-link" onclick="location.reload()">REBOOT</button>
    </nav>

    <script>
        const sb = supabase.createClient('https://eaxuqsiwrfqshqkwtnlz.supabase.co', 'sb_publishable_PViFkgap3gvsxBgG2NSAjA_Oc0eASzI');
        let questions = JSON.parse(localStorage.getItem('space_v2')) || [];
        let hp = 100, score = 0, qDone = 0, activeJoker = null, curIdx = null, catStats = {};
        let usedJokers = { Schild: false, Schwert: false, Trank: false };

        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        function toggleJoker(type) {
            if(usedJokers[type]) return;
            const b = document.getElementById('j-'+type);
            if(activeJoker === type) { activeJoker = null; b.classList.remove('active'); }
            else { activeJoker = type; document.querySelectorAll('.j-box').forEach(x => x.classList.remove('active')); b.classList.add('active'); }
        }

        function load() {
            const f = document.getElementById('excel-input').files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                questions = data.map(x => ({
                    c: x.Kategorie || "Sektor X", q: x.Frage || x.q,
                    a: parseFloat(String(x.Antwort || x.a).replace(/[^0-9.-]/g, '')),
                    b: String(x.Boss || "").toLowerCase().includes('ja'), u: false
                })).filter(x => x.q && !isNaN(x.a));
                localStorage.setItem('space_v2', JSON.stringify(questions));
                localStorage.setItem('space_filename', f.name); location.reload();
            }; r.readAsArrayBuffer(f);
        }

        function render() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            const isBoss = ((qDone + 1) % 4 === 0);
            if(isBoss) {
                const c = document.createElement('div'); c.className = "card boss"; c.innerHTML = "BOSS DETECTED";
                c.onclick = () => { const q = questions.find(x => x.b && !x.u) || questions.find(x => !x.u); start(questions.indexOf(q), true); };
                grid.appendChild(c);
            } else {
                [...new Set(questions.map(x => x.c))].forEach(cat => {
                    const u = catStats[cat] || 0; const c = document.createElement('div');
                    c.className = "card" + (u >= 2 ? " disabled" : ""); c.innerHTML = `<strong>${cat}</strong><br><small>${u}/2</small>`;
                    if(u < 2) c.onclick = () => { start(questions.findIndex(x => x.c === cat && !x.u)); catStats[cat] = u + 1; };
                    grid.appendChild(c);
                });
            }
        }

        function start(idx, boss = false) {
            curIdx = idx; document.getElementById('boss-tag').style.display = boss ? 'block' : 'none';
            document.getElementById('q-cat').innerText = questions[idx].c; document.getElementById('q-text').innerText = questions[idx].q;
            document.getElementById('feedback').innerText = ""; document.getElementById('ans-input').value = "";
            document.getElementById('btn-next').style.display = 'none'; document.getElementById('btn-check').style.display = 'block';
            openM('modal-quiz');
        }

        function check() {
            const q = questions[curIdx]; const g = parseFloat(document.getElementById('ans-input').value); if(isNaN(g)) return;
            let d = Math.abs(g - q.a);
            if(activeJoker === 'Schild' && d > 10) d = 10; if(activeJoker === 'Trank') d = Math.floor(d/2);
            if(d === 0) { let h = (activeJoker==='Schwert')?15:5; hp=Math.min(100, hp+h); score+=500; document.getElementById('feedback').innerHTML = `<span style="color:var(--blue)">CRITICAL HIT! +${h} HP</span>`; }
            else { hp-=d; score+=Math.max(0, 100-d); document.getElementById('feedback').innerHTML = `<span style="color:var(--accent)">DAMAGE! -${d} HP | TARGET: ${q.a}</span>`; }
            if(activeJoker) { usedJokers[activeJoker]=true; document.getElementById('j-'+activeJoker).classList.add('used'); activeJoker=null; }
            q.u = true; qDone++; document.getElementById('hp-val').innerText = hp;
            document.getElementById('btn-check').style.display='none'; document.getElementById('btn-next').style.display='block';
            if(hp <= 0 || qDone >= 20) end();
        }

        function next() { closeM('modal-quiz'); render(); }
        async function end() { const n = localStorage.getItem('quiz_username') || 'Pilot'; await sb.from('highscores').insert([{ name:n, score }]); alert("MISSION ENDE! SCORE: "+score); location.reload(); }

        window.onload = () => {
            document.getElementById('p-name').innerText = localStorage.getItem('quiz_username') || "PILOT";
            const f = localStorage.getItem('space_filename'); if(f) document.getElementById('file-name').innerText = "OS: " + f;
            if(questions.length > 0) render(); else openM('modal-upload');
        };
    </script>
</body>
</html>
